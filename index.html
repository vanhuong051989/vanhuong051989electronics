<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUONG ELECTRONICS</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f2f6ff;
}

/* Header */
header{
    background:linear-gradient(90deg,#0d47a1,#1976d2);
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Danh sách */
.container{
    padding:15px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
}

/* Sản phẩm */
.product{
    background:white;
    border-radius:10px;
    padding:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    text-align:center;
    transition:0.2s;
}
.product:hover{
    transform:scale(1.02);
}

/* Ảnh */
.product img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
}

/* Tên */
.product h3{
    font-size:16px;
    margin:8px 0 5px;
}

/* Giá */
.price{
    color:red;
    font-weight:bold;
}

/* Thông tin */
.info{
    font-size:13px;
    margin-top:5px;
}

/* Footer */
footer{
    background:#0d47a1;
    color:white;
    padding:20px;
    margin-top:20px;
}

/* Modal xem ảnh */
#modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
#modal img{
    max-width:90%;
    max-height:90%;
}
</style>
</head>

<body>

<header>
HUONG ELECTRONICS - DANH SÁCH SẢN PHẨM
</header>

<div class="container">

<!-- SẢN PHẨM 1 -->
<div class="product">
    <img src="link-anh-1.jpg" onclick="openImage(this,1)">
    <h3>Máy Kích Cá 1</h3>
    <div class="price">3.500.000đ</div>
    <div class="info">
        Lượt xem: <span id="view1">0</span><br>
        Lượt mua: <span>25</span>
    </div>
</div>

<!-- SẢN PHẨM 2 -->
<div class="product">
    <img src="link-anh-2.jpg" onclick="openImage(this,2)">
    <h3>Máy Kích Cá 2</h3>
    <div class="price">4.200.000đ</div>
    <div class="info">
        Lượt xem: <span id="view2">0</span><br>
        Lượt mua: <span>18</span>
    </div>
</div>

<!-- SẢN PHẨM 3 -->
<div class="product">
    <img src="link-anh-3.jpg" onclick="openImage(this,3)">
    <h3>Bo Mạch Công Suất</h3>
    <div class="price">1.200.000đ</div>
    <div class="info">
        Lượt xem: <span id="view3">0</span><br>
        Lượt mua: <span>40</span>
    </div>
</div>

<!-- THÊM SẢN PHẨM BÊN DƯỚI CỨ COPY KHỐI NÀY -->

</div>

<!-- Modal xem ảnh -->
<div id="modal" onclick="closeImage()">
    <img id="modalImg">
</div>

<footer>
<h3>LIÊN HỆ</h3>
Địa chỉ: Hải Phòng<br>
Zalo: 09xxxxxxxx<br>
Facebook: HUONG ELECTRONICS<br>
© 2026 HUONG ELECTRONICS
</footer>

<script>
function openImage(img,id){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalImg").src = img.src;

    // Tăng lượt xem
    let view = document.getElementById("view"+id);
    view.innerText = parseInt(view.innerText) + 1;
}

function closeImage(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
